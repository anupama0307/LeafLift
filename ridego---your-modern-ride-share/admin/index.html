<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>LeafLift Admin — Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

    <!-- Mapbox GL JS v2 -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <script>
        window.MAPBOX_TOKEN = 'MAPBOX_TOKEN_PLACEHOLDER';
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dash-bg': '#000000',
                        'card-bg': '#121214',
                        'card-border': '#222224',
                        'accent-purple': '#A78BFA',
                        'accent-yellow': '#FDE047',
                        'accent-green': '#4ADE80',
                        'accent-cyan': '#22D3EE',
                        'accent-rose': '#FB7185',
                        'text-muted': '#9CA3AF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        
        .card {
            background-color: #121214;
            border: 1px solid #222224;
            border-radius: 1.5rem;
            padding: 1.5rem;
        }
        
         ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        
         ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        
         ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .dot-grid {
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .bar-striped {
            background: repeating-linear-gradient( 45deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.05) 5px, transparent 5px, transparent 10px);
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .slide-up {
            animation: slide-up 0.4s ease-out forwards;
        }
        
        .slide-up-d1 {
            animation: slide-up 0.4s ease-out 0.08s forwards;
            opacity: 0;
        }
        
        .slide-up-d2 {
            animation: slide-up 0.4s ease-out 0.16s forwards;
            opacity: 0;
        }
        
        .slide-up-d3 {
            animation: slide-up 0.4s ease-out 0.24s forwards;
            opacity: 0;
        }
        
        .slide-up-d4 {
            animation: slide-up 0.4s ease-out 0.32s forwards;
            opacity: 0;
        }
        
        @keyframes pulse-ring {
            0% {
                transform: scale(0.9);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.05);
                opacity: 1;
            }
            100% {
                transform: scale(0.9);
                opacity: 0.7;
            }
        }
        
        .pulse-ring {
            animation: pulse-ring 2s ease-in-out infinite;
        }
        
        @keyframes fade-in {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .animate-fade-in {
            animation: fade-in 0.3s ease-out forwards;
        }
    </style>
</head>

<body class="p-0 m-0">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
