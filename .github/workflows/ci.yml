name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-and-backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root (frontend) dependencies
        working-directory: ./ridego---your-modern-ride-share
        run: npm install

      - name: Run frontend tests
        working-directory: ./ridego---your-modern-ride-share
        run: npm test

      - name: Install backend dependencies
        working-directory: ./ridego---your-modern-ride-share/server
        run: npm install

      - name: Run backend tests
        working-directory: ./ridego---your-modern-ride-share/server
        run: npm test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          OLA_MAPS_API_KEY: ${{ secrets.OLA_MAPS_API_KEY }}
          OTP_EMAIL_USER: ${{ secrets.OTP_EMAIL_USER }}
          OTP_EMAIL_PASS: ${{ secrets.OTP_EMAIL_PASS }}

  deploy-backend-railway:
    needs: frontend-and-backend-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Backend deploys via Railway GitHub integration
        run: echo "Railway auto-deploys the backend when this push hits main. No extra step needed here."

  deploy-frontend-vercel:
    needs: frontend-and-backend-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install frontend dependencies
        working-directory: ./ridego---your-modern-ride-share
        run: npm install

      - name: Build frontend
        working-directory: ./ridego---your-modern-ride-share
        run: npm run build

      - name: Deploy to Vercel
        working-directory: ./ridego---your-modern-ride-share
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          rm -rf .vercel
          mkdir -p .vercel
          echo "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\"}" > .vercel/project.json
          vercel deploy --prod --token=$VERCEL_TOKEN
