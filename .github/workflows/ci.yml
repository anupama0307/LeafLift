name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-and-backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root (frontend) dependencies
        working-directory: ./ridego---your-modern-ride-share
        run: npm install

      - name: Run frontend tests
        working-directory: ./ridego---your-modern-ride-share
        run: npm test

      - name: Install backend dependencies
        working-directory: ./ridego---your-modern-ride-share/server
        run: npm install

      - name: Run backend tests
        working-directory: ./ridego---your-modern-ride-share/server
        run: npm test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          OLA_MAPS_API_KEY: ${{ secrets.OLA_MAPS_API_KEY }}
          OTP_EMAIL_USER: ${{ secrets.OTP_EMAIL_USER }}
          OTP_EMAIL_PASS: ${{ secrets.OTP_EMAIL_PASS }}

  deploy-backend-railway:
    needs: frontend-and-backend-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Backend deploys via Railway GitHub integration
        run: echo "Railway auto-deploys the backend when this push hits main. No extra step needed here."

  deploy-frontend-vercel:
    needs: frontend-and-backend-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install frontend dependencies
        working-directory: ./ridego---your-modern-ride-share
        run: npm install

      - name: Build and deploy to Vercel
        working-directory: ./ridego---your-modern-ride-share
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Resolve org ID (personal account: use user ID; team: use defaultTeamId)
          USER_JSON=$(curl -sf -H "Authorization: Bearer $VERCEL_TOKEN" https://api.vercel.com/v2/user)
          ORG_ID=$(echo "$USER_JSON" | python3 -c "import sys,json; u=json.load(sys.stdin)['user']; print(u.get('defaultTeamId') or u['id'])")

          # For team accounts include teamId so team projects are returned
          TEAM_PARAM=""
          if echo "$ORG_ID" | grep -q "^team_"; then
            TEAM_PARAM="&teamId=$ORG_ID"
          fi

          # Find matching project
          PROJECTS_JSON=$(curl -sf -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v9/projects?limit=100${TEAM_PARAM}")
          echo "Vercel projects found:"
          echo "$PROJECTS_JSON" | python3 -c "import sys,json; [print(' -', p['name'], p['id']) for p in json.load(sys.stdin).get('projects',[])]"

          PROJECT_ID=$(echo "$PROJECTS_JSON" | python3 -c "
          import sys, json
          projects = json.load(sys.stdin).get('projects', [])
          for p in projects:
              if 'ridego' in p['name'].lower() or 'leaflift' in p['name'].lower() or 'leaf_lift' in p['name'].lower():
                  print(p['id']); break
          else:
              print(projects[0]['id']) if projects else exit(1)
          ")

          echo "ORG_ID=$ORG_ID  PROJECT_ID=$PROJECT_ID"

          # Export so all subsequent vercel CLI calls pick them up
          export VERCEL_ORG_ID="$ORG_ID"
          export VERCEL_PROJECT_ID="$PROJECT_ID"

          # Pull project settings (env vars, framework detection, etc.)
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN

          # Build and deploy
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
