name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-and-backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root (frontend) dependencies
        working-directory: ./ridego---your-modern-ride-share
        run: npm install

      - name: Run frontend tests
        working-directory: ./ridego---your-modern-ride-share
        run: npm test

      - name: Install backend dependencies
        working-directory: ./ridego---your-modern-ride-share/server
        run: npm install

      - name: Run backend tests
        working-directory: ./ridego---your-modern-ride-share/server
        run: npm test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          OLA_MAPS_API_KEY: ${{ secrets.OLA_MAPS_API_KEY }}
          OTP_EMAIL_USER: ${{ secrets.OTP_EMAIL_USER }}
          OTP_EMAIL_PASS: ${{ secrets.OTP_EMAIL_PASS }}
